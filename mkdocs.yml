site_name: 🤖 Inteligencia Artificial (ymorgil)
site_url: https://ymorgil.github.io/intart/

theme:
   name: material
   language: es
   #logo: assets/favicon.svg
   palette:
      - scheme: default
        primary: deep purple
        accent: indigo
        toggle:
           icon: material/toggle-switch-off-outline
           name: Modo oscuro
      - scheme: slate
        primary: teal
        accent: green
        toggle:
           icon: material/toggle-switch
           name: Modo claro
nav:
   - Inicio: index.md
   - Prompts: 01prompts.md
   - Claude: 02claude.md
   - Gemini: 03gemini.md
   - Chat GPT: 04gpt.md
   - NotebookLM: 05notebook.md
   - Moodle: 06moodle.md
   - Imágenes: 07imagenes.md
   - Skills: 08skills.md

plugins:
   - glightbox

extra_css:
   - assets/css/extra.css

markdown_extensions:
   - attr_list
   - md_in_html
   - admonition
   - pymdownx.details
   - pymdownx.highlight:
        anchor_linenums: false
        use_pygments: true
   - pymdownx.superfences
   - pymdownx.inlinehilite
   - pymdownx.tabbed:
        alternate_style: true
