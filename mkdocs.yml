site_name: 🤖 Inteligencia Artificial (ymorgil)
site_url: https://ymorgil.github.io/intart/

theme:
   name: material
   language: es
   #logo: assets/favicon.svg
   palette:
      - scheme: default
        primary: deep purple
        accent: indigo
        toggle:
           icon: material/toggle-switch-off-outline
           name: Modo oscuro
      - scheme: slate
        primary: teal
        accent: green
        toggle:
           icon: material/toggle-switch
           name: Modo claro
nav:
   - Inicio: index.md
   - Claude: claude.md
   - Mytop: top.md
   - esquema: prompts/1.esquema.md
   - a06: prompts/imagenes.md
   - a7: prompts/misprompts.md
   - Moodle: prompts/moodle.md
   - NotebookLM: prompts/notebook.md

plugins:
   - glightbox

extra_css:
   - assets/css/extra.css

markdown_extensions:
   - attr_list
   - pymdownx.highlight:
        anchor_linenums: false
        use_pygments: true
   - pymdownx.superfences
   - pymdownx.inlinehilite
